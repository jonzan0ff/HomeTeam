name: HomeTeam UI QA

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "macos/**"
      - ".github/workflows/ui-qa.yml"

jobs:
  snapshot-qa:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Widget Snapshot QA
        run: HOMETEAM_QA_WIDGET_SNAPSHOT_MODE=coverage HOMETEAM_QA_STORAGE_MODE=isolated macos/scripts/capture_widget_screenshot.sh qa/screenshots

      - name: Frontend Snapshot QA
        run: HOMETEAM_QA_WIDGET_SNAPSHOT_MODE=coverage HOMETEAM_QA_STORAGE_MODE=isolated macos/scripts/qa_frontend_ui.sh

      - name: Upload QA Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hometeam-ui-qa-artifacts
          path: |
            qa/screenshots
            qa/screenshots
            /tmp/HomeTeamUIQA_*.xcresult
            /tmp/HomeTeamWidgetSnapshot_*.xcresult
          if-no-files-found: warn

  # XCTest UI bundle: launches the app (Accessibility). Requires valid code signing on the runner.
  ui-tests:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HomeTeamUITests
        run: CI=true HOMETEAM_QA_ALLOW_LOCAL_XCODEBUILD=1 macos/scripts/qa_ui_tests.sh

      - name: Upload UI test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hometeam-ui-tests-xcresult
          path: /tmp/HomeTeamDerivedUITests/Logs/Test/*.xcresult
          if-no-files-found: warn
