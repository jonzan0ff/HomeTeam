name: HomeTeam UI QA

# Manual-trigger only. Per qa-standards §8, snapshot/widget UI tests run on
# claudesandbox where a real window server session exists. GitHub Actions
# runners crash with `CGSConnectionByID` assertion when SwiftUI/AppKit code
# tries to connect during xcodebuild test. The workflow is preserved here
# for documented reproducibility but is gated to workflow_dispatch only.
on:
  workflow_dispatch:

jobs:
  snapshot-qa:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Widget Snapshot QA
        run: HOMETEAM_QA_WIDGET_SNAPSHOT_MODE=coverage HOMETEAM_QA_STORAGE_MODE=isolated macos/scripts/build_verification_widget_snapshot.sh qa/screenshots

      - name: Frontend Snapshot QA
        run: HOMETEAM_QA_WIDGET_SNAPSHOT_MODE=coverage HOMETEAM_QA_STORAGE_MODE=isolated macos/scripts/build_verification_frontend_ui.sh

      - name: Upload QA Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hometeam-ui-qa-artifacts
          path: |
            qa/screenshots
            qa/screenshots
            /tmp/HomeTeamUIQA_*.xcresult
            /tmp/HomeTeamWidgetSnapshot_*.xcresult
          if-no-files-found: warn

  # XCTest UI bundle: launches the app (Accessibility). Requires valid code signing on the runner.
  ui-tests:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HomeTeamUITests
        run: CI=true HOMETEAM_QA_ALLOW_LOCAL_XCODEBUILD=1 macos/scripts/build_verification_ui_tests.sh

      - name: Upload UI test result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hometeam-ui-tests-xcresult
          path: /tmp/HomeTeamDerivedUITests/Logs/Test/*.xcresult
          if-no-files-found: warn
