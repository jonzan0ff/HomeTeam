name: HomeTeam unit gate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "macos/**"
      - ".github/workflows/unit-gate.yml"

jobs:
  prompt-free-tests:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deterministic tests (no network)
        env:
          CI: "true"
        run: |
          chmod +x macos/scripts/qa_unit_gate.sh
          macos/scripts/qa_unit_gate.sh
