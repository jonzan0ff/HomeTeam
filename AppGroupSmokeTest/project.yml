name: AppGroupSmokeTest
options:
  bundleIdPrefix: com.hometeam
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic

targets:
  SmokeApp:
    type: application
    platform: macOS
    sources:
      - path: SmokeApp
    settings:
      base:
        PRODUCT_NAME: SmokeApp
        PRODUCT_BUNDLE_IDENTIFIER: com.hometeam.smokeapp
        CODE_SIGN_ENTITLEMENTS: SmokeApp/SmokeApp.entitlements
        INFOPLIST_FILE: SmokeApp/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_MODULE_NAME: SmokeApp
        ALWAYS_SEARCH_USER_PATHS: NO
    dependencies:
      - target: SmokeWidget
        embed: true

  SmokeWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: SmokeWidget
    settings:
      base:
        PRODUCT_NAME: SmokeWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.hometeam.smokeapp.widget
        CODE_SIGN_ENTITLEMENTS: SmokeWidget/SmokeWidget.entitlements
        INFOPLIST_FILE: SmokeWidget/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_MODULE_NAME: SmokeWidget
        DEFINES_MODULE: NO
        ALWAYS_SEARCH_USER_PATHS: NO
        SKIP_INSTALL: YES

  SmokeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SmokeTests
    settings:
      base:
        PRODUCT_NAME: SmokeTests
        PRODUCT_BUNDLE_IDENTIFIER: com.hometeam.smoketests
        CODE_SIGN_ENTITLEMENTS: SmokeTests/SmokeTests.entitlements
        INFOPLIST_FILE: SmokeTests/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_MODULE_NAME: SmokeTests
        ALWAYS_SEARCH_USER_PATHS: NO
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SmokeApp.app/Contents/MacOS/SmokeApp"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: SmokeApp

schemes:
  SmokeApp:
    build:
      targets:
        SmokeApp: all
        SmokeWidget: [build]
        SmokeTests: [test]
    run:
      targets:
        - SmokeApp
      config: Debug
    test:
      targets:
        - SmokeTests
      config: Debug
    profile:
      config: Release
    archive:
      config: Release
