name: AppGroupSmokeTest
options:
  bundleIdPrefix: com.jonzanoff
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_STYLE: Automatic

targets:
  SmokeApp:
    type: application
    platform: macOS
    sources:
      - path: SmokeApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonzanoff.smokeapp
        CODE_SIGN_ENTITLEMENTS: SmokeApp/SmokeApp.entitlements
        INFOPLIST_FILE: SmokeApp/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

  SmokeWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: SmokeWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonzanoff.smokeapp.widget
        CODE_SIGN_ENTITLEMENTS: SmokeWidget/SmokeWidget.entitlements
        INFOPLIST_FILE: SmokeWidget/Info.plist
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSExtension_NSExtensionPointIdentifier: com.apple.widgetkit-extension
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - target: SmokeApp

  SmokeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: SmokeTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonzanoff.smoketests
        CODE_SIGN_ENTITLEMENTS: SmokeTests/SmokeTests.entitlements
        INFOPLIST_FILE: SmokeTests/Info.plist
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: SmokeApp
